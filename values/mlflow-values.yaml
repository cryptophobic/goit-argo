# Reference copy of the MLflow Helm overrides (kept for readability / reuse).
#
# NOTE: the live Application (../application.yaml) embeds these same values
# inline (Variant A), because pulling a chart from a Helm repository while
# reading valueFiles from this Git repo would require ArgoCD multi-source.
# If you switch to a Git-hosted chart (path: ...), you can reference this file
# via spec.source.helm.valueFiles: [values/mlflow-values.yaml] (Variant B).
replicaCount: 1

service:
  enabled: true
  type: ClusterIP
  port: 80
  containerPort: 5000

backendStore:
  databaseMigration: false
  databaseConnectionCheck: false

# Single gunicorn worker: the default (multiple workers) each re-runs the SQLite
# migration on startup, which saturates a tiny t3.small node and makes the
# /health probe time out. One worker is plenty for a demo.
extraArgs:
  workers: "1"

# Give MLflow time to migrate + boot before probes start failing.
livenessProbe:
  initialDelaySeconds: 40
  timeoutSeconds: 10
  periodSeconds: 30
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 40
  timeoutSeconds: 10
  periodSeconds: 30
  failureThreshold: 6

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi