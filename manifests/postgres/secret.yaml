# Демо-креденшели для MLflow backend. Для homework-демо цього достатньо;
# у проді треба тримати у Sealed Secrets / External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: mlflow
type: Opaque
stringData:
  POSTGRES_USER: mlflow
  POSTGRES_PASSWORD: mlflow-pass
  POSTGRES_DB: mlflow