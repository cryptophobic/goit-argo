# Grafana datasource sidecar (постачається kube-prometheus-stack-ом) сканує
# ConfigMap-и з лейблом `grafana_datasource: "1"` у всіх namespace-ах і
# реєструє їх як datasource-и. Цей ConfigMap додає Loki без редагування
# values.yaml KPS.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.logging.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000