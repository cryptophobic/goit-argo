# ArgoCD Application — deploys the MLflow Helm chart from ArtifactHub
# (community-charts) into the `application` namespace.
#
# Variant A (inline values): the Helm overrides live directly under
# spec.source.helm.values. This is the robust choice when the chart comes from
# a Helm repository (a separate `valueFiles` from this Git repo would require
# ArgoCD multi-source, which we deliberately avoid here).
#
# Register it once with:
#   kubectl apply -f application.yaml
# After that, auto-sync + self-heal keep MLflow reconciled from Git/Helm.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  # Namespace where ArgoCD is installed (criterion: infra-tools).
  namespace: infra-tools
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # From ArtifactHub: community-charts / mlflow.
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: 1.8.1
    helm:
      # Inline overrides (Variant A). File-based backend => no external DB.
      values: |
        replicaCount: 1
        service:
          enabled: true
          type: ClusterIP
          port: 80
          containerPort: 5000
        backendStore:
          databaseMigration: false
          databaseConnectionCheck: false
        # Single gunicorn worker: the default (multiple workers) each re-runs the
        # SQLite migration on startup, which saturates a tiny t3.small node and
        # makes the /health probe time out. One worker is plenty for a demo.
        extraArgs:
          workers: "1"
        # Give MLflow time to migrate + boot before probes start failing.
        livenessProbe:
          initialDelaySeconds: 40
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 6
        readinessProbe:
          initialDelaySeconds: 40
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 6
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: application

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true