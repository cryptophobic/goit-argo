# MinIO як S3-сумісне сховище MLflow артефактів.
# Чарт офіційний — https://charts.min.io/. Стартує bucket `mlflow-artifacts`
# через `buckets`-секцію (chart запускає mc-job після підняття сервера).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: infra-tools
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.4.0
    helm:
      values: |
        mode: standalone
        replicas: 1
        rootUser: mlflow
        rootPassword: mlflow-secret-key
        persistence:
          enabled: false
        buckets:
          - name: mlflow-artifacts
            policy: none
            purge: false
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
        service:
          type: ClusterIP
          port: 9000
        consoleService:
          type: ClusterIP
          port: 9001
  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true