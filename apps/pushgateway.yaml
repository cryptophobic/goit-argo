# Prometheus PushGateway — точка прийому метрик від batch-job-ів (як
# train_and_push.py). DNS: prometheus-pushgateway.monitoring.svc.cluster.local:9091.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pushgateway
  namespace: infra-tools
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-pushgateway
    targetRevision: 3.4.0
    helm:
      values: |
        image:
          registry: docker.io
          repository: prom/pushgateway
        serviceAccount:
          create: true
        service:
          type: ClusterIP
          port: 9091
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true